name: flutter_sau_health_calculator_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.12.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2 # ใช้เปิดเว็ป โทรได้
  flutter_map: ^8.2.2 # ใช้แผนที่
  latlong2: ^0.9.1 # ใช้สำหรับพิกัดบนแผนที่
  carousel_slider: ^5.1.2 # ใช้สำหรับสไลด์รูปภาพ
  icons_launcher: ^3.0.3 # ใช้สำหรับสร้างไอคอนแอป

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
